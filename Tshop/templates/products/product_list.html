{% extends 'base/base.html' %}

{% block title %}
Products
{% endblock %}

{% block content %}

<!-- Fix for fixed header overlap -->
<div class="container-fluid pt-5 mt-3">

    <!-- Top Action -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="fw-bold">Products</h3>
        <a href="{% url 'add_product' %}" class="btn btn-success">
            + Add Product
        </a>
    </div>

    <!-- Cards Grid -->
    <div class="row g-4">
        {% for product in products %}
            {% include 'products/includes/productCard.html' %}
        {% empty %}
            <p class="text-muted text-center">No products added yet.</p>
        {% endfor %}
    </div>

</div>

{% endblock %}
